server.port=8081

# MongoDB connection — provide via env var. Example URI shape:
#   mongodb+srv://USER:PASS@cluster.example.mongodb.net/DBNAME?retryWrites=true&w=majority&...
# For local dev create application-local.properties (gitignored) with a literal value.
spring.data.mongodb.uri=${MONGO_URI:}

# Daily report recipient — provide via env var (leave blank to disable).
DAILY_REPORT_EMAIL=${DAILY_REPORT_EMAIL:}

# Extra grace for /quiz/answer latency checks at the inactivity boundary.
app.answer-inactivity-grace-ms=${ANSWER_INACTIVITY_GRACE_MS:500}

server.compression.enabled=true
server.compression.mime-types=application/json,text/json,text/plain
server.compression.min-response-size=512
server.tomcat.max-threads=50
spring.main.lazy-initialization=true
spring.datasource.hikari.maximum-pool-size=5
